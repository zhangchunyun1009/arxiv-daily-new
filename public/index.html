<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arxiv 论文速递 - IDA Lab</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <h1><span>Arxiv 论文速递</span></h1>
      <p><span class="leaf">🌱</span> IDA 的小伙伴们，用阅读最新论文开启新的一天！ <span class="leaf">🌱</span></p>
      <div id="header-date" class="header-date">加载中</div>
    </header>

    <main class="main-wrapper">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">📅 历史记录</div>
        <div id="date-list" class="date-list"></div>
      </aside>

      <section class="content-area">
        <div class="toolbar">
          <button id="sidebar-toggle" class="sidebar-toggle" type="button" title="切换侧边栏">☰</button>
          <button id="refresh-toggle" class="toolbar-btn primary" type="button">🔄 刷新今日数据</button>
          <button id="favorites-toggle" class="toolbar-btn ghost" type="button">⭐ 收藏</button>
          <button id="unread-toggle" class="toolbar-btn ghost" type="button">✓ 未读</button>
          <div class="search-box">
            <input id="search-input" type="search" placeholder="搜索论文...">
          </div>
          <div class="auto-status"><span></span>每日 8:30 自动更新</div>
        </div>

        <div id="tabs" class="tabs-wrapper"></div>
        <div id="status" class="status-box">正在加载论文数据...</div>
        <div id="papers-container" class="papers-container"></div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
